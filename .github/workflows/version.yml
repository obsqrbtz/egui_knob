name: Version sync

on:
  workflow_run:
    workflows: ["Build"]
    types: [completed]

permissions:
  contents: write

jobs:
  version:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'ci_test' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Update README and tag release
        run: |
          CURRENT_VERSION=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)
          echo "Current version: $CURRENT_VERSION"
          echo "Latest tag: $LATEST_TAG"
          if [ "$LATEST_TAG" = "v$CURRENT_VERSION" ]; then
            echo "No version change detected. Skipping release tagging."
            exit 0
          fi
          echo "Updating README for version $CURRENT_VERSION"
          EGUI_VERSION=$(grep '^egui = ' Cargo.toml | cut -d'"' -f2)
          EFRAME_VERSION=$(grep '^eframe = ' Cargo.toml | cut -d'"' -f2 | head -1)
          sed -i 's/egui = "[^"]*"/egui = "'$EGUI_VERSION'"/' README.md
          sed -i 's/eframe = "[^"]*"/eframe = "'$EFRAME_VERSION'"/' README.md
          sed -i 's/egui_knob = "[^"]*"/egui_knob = "'$CURRENT_VERSION'"/' README.md
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          if git diff --cached --quiet; then
            echo "No README changes to commit"
          else
            git commit -m "Sync README version to $CURRENT_VERSION [skip ci]"
            git push origin HEAD
          fi
          if git rev-parse "refs/tags/v$CURRENT_VERSION" >/dev/null 2>&1; then
            echo "Tag v$CURRENT_VERSION already exists"
          else
            git tag -a "v$CURRENT_VERSION" -m "Release v$CURRENT_VERSION"
            git push origin "v$CURRENT_VERSION"
          fi
